## 大模型提示词模板

### 系统提示词

```yaml
system_prompt: |
  你是一个嵌入式技能助手。当用户请求与硬件配置、软件开发、编译构建、
  调试分析等相关的任务时，你应该：
  
  1. 首先理解用户的需求
  2. 识别需要使用的技能
  3. 按照技能的使用说明执行任务
  4. 返回结构化的结果
  
  可用技能列表：
  {skill_list}
  
  使用技能时，请参考对应技能的 SKILL.md 文件。
```

### 技能调用提示词

```yaml
skill_invocation: |
  请使用 {skill_name} 技能完成任务。
  
  技能说明：
  {skill_description}
  
  执行步骤：
  {skill_steps}
  
  请按步骤执行，并在完成后返回结果。
```

### 结果格式提示词

```yaml
result_format: |
  技能执行结果应包含以下字段：
  
  | 字段 | 类型 | 说明 |
  |------|------|------|
  | status | string | success/failure |
  | summary | string | 简要总结 |
  | details | object | 详细信息 |
  | artifacts | array | 产物列表 |
  | errors | array | 错误信息（如果有）|
  
  示例：
  {
    "status": "success",
    "summary": "构建成功，产物位于 build/app",
    "details": {
      "build_time": "12.5s",
      "compiler": "gcc 9.4.0"
    },
    "artifacts": [
      {"path": "build/app", "size": 123456}
    ]
  }
```

### 错误处理提示词

```yaml
error_handling: |
  当技能执行失败时，请提供：
  
  1. **failure_category**（失败分类）：
     - `tool-missing`：缺少必要工具
     - `project-config-error`：项目配置错误
     - `compilation-error`：编译错误
     - `permission-denied`：权限不足
     - `artifact-missing`：产物未找到
  
  2. **suggestion**（建议）：
     - 针对失败分类提供具体的解决建议
  
  3. **evidence**（证据）：
     - 命令输出、日志信息等
  
  示例：
  {
    "status": "failure",
    "failure_category": "tool-missing",
    "summary": "缺少 gcc 编译器",
    "suggestion": "请安装 gcc：apt install gcc",
    "evidence": ["bash: gcc: command not found"]
  }
```

