# Plumb-Link 技能接口模板

本文件定义了大模型与技能交互的通用模板。

---

## 技能注册表结构

```yaml
# agents/skill_registry.yaml
skills:
  - name: build-linux-app
    category: software
    version: 1.0.0
    description: "配置、编译 Linux 应用工程，支持 ARM64 交叉编译"
    keywords:
      - "编译"
      - "build"
      - "cmake"
      - "交叉编译"
      - "arm64"
    agents:
      - openai
      - claude
      - trae
    shared_deps:
      - tool_config
    platforms:
      - linux
      - windows
      - wsl
    required_tools:
      - cmake
      - make
      - gcc

  - name: gpio-config
    category: hardware
    version: 1.0.0
    description: "GPIO 引脚配置和管理"
    keywords:
      - "gpio"
      - "引脚"
      - "pin"
    agents:
      - openai
      - claude
      - trae
    platforms:
      - linux
    required_tools:
      - gpioset
```

