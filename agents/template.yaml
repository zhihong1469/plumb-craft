## 技能自动发现规则

```yaml
auto_discovery:
  # 按文件特征自动匹配技能
  file_patterns:
    "CMakeLists.txt":
      - build-linux-app
    "Makefile":
      - build-linux-app
    "*.c" | "*.h":
      - embedded-c-coding
    "platformio.ini":
      - build-platformio
  
  # 按指令关键词自动匹配
  intent_keywords:
    "编译|构建|build|compile":
      - build-linux-app
    "烧录|flash|download":
      - flash-openocd
    "调试|debug|gdb":
      - debug-gdb-openocd
    "GPIO|引脚|pin":
      - gpio-config
    "I2C|i2c":
      - i2c-scan
    "串口|serial|uart":
      - serial-monitor
```

---

## 技能交接规则

```yaml
handoff_rules:
  # 构建完成后 → 调试
  build-success:
    next_skill: debug-linux-app
    condition: "用户下一步需要调试"
  
  # 调试完成后 → 运行
  debug-success:
    next_skill: serial-monitor
    condition: "需要查看运行日志"
  
  # 编译错误 → 代码检查
  compilation-error:
    next_skill: static-analysis
    condition: "需要分析代码问题"
  
  # 工具缺失 → 环境配置
  tool-missing:
    next_skill: env-setup
    condition: "需要配置开发环境"
```

